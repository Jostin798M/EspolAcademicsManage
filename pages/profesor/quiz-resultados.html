<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados del Quiz — Profesor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-menu-toggle" id="btn-menu-toggle"><i class="bi-list"></i></button>
        <span class="topbar-title" id="topbar-title">Resultados del Quiz</span>
        <nav class="breadcrumb">
          <a href="mis-cursos.html">Mis Cursos</a>
          <i class="bi-chevron-right text-xs"></i>
          <a id="btn-volver" href="#">Curso</a>
          <i class="bi-chevron-right text-xs"></i>
          <span class="current">Resultados</span>
        </nav>
      </div>
    </header>

    <main class="page-content page-enter">
      <div class="page-header">
        <div>
          <h2 id="quiz-titulo">—</h2>
          <span class="text-sm text-muted" id="quiz-preguntas"></span>
        </div>
        <a id="btn-volver-btn" href="#" class="btn btn-ghost btn-sm"><i class="bi-arrow-left"></i> Volver</a>
      </div>

      <div class="alert alert-info" style="margin-bottom:20px">
        <i class="bi-info-circle"></i>
        <span>Las preguntas de correccion manual requieren revision adicional del profesor.</span>
      </div>

      <div class="table-container">
        <table class="table">
          <thead>
            <tr>
              <th>Estudiante</th>
              <th>Fecha de entrega</th>
              <th>Nota automatica</th>
              <th>Nota manual</th>
            </tr>
          </thead>
          <tbody id="tabla-resultados"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<script src="../../js/data/mockdata.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/pages/auth.js"></script>
<script src="../../js/pages/profesor.js"></script>
<script>
  QuizResultados.init();
  document.getElementById("btn-volver-btn").href = document.getElementById("btn-volver").href;
</script>
</body>
</html>
