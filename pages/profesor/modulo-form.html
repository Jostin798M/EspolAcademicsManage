<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modulo — Profesor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-menu-toggle" id="btn-menu-toggle"><i class="bi-list"></i></button>
        <span class="topbar-title" id="topbar-title">Modulo</span>
        <nav class="breadcrumb">
          <a href="mis-cursos.html">Mis Cursos</a>
          <i class="bi-chevron-right text-xs"></i>
          <a id="btn-volver" href="#">Gestion del Curso</a>
          <i class="bi-chevron-right text-xs"></i>
          <span class="current">Modulo</span>
        </nav>
      </div>
    </header>

    <main class="page-content page-enter">
      <div class="page-header">
        <h2>Modulo</h2>
        <a id="btn-volver-btn" href="#" class="btn btn-ghost btn-sm"><i class="bi-arrow-left"></i> Volver</a>
      </div>

      <div class="content-grid-2" style="gap:24px">

        <!-- Datos del modulo -->
        <div class="card">
          <div class="card-header"><h4>Datos del Modulo</h4></div>
          <div class="card-body">
            <div class="form-grid form-grid-2" style="gap:16px">
              <div class="form-group" style="grid-column:1/-1">
                <label class="form-label">Titulo <span class="required">*</span></label>
                <input type="text" id="m-titulo" class="form-control" placeholder="Ej: Introduccion a HTML">
              </div>
              <div class="form-group" style="grid-column:1/-1">
                <label class="form-label">Descripcion</label>
                <textarea id="m-descripcion" class="form-control" rows="3" placeholder="Descripcion del modulo..."></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Orden</label>
                <input type="number" id="m-orden" class="form-control" min="1" value="1">
              </div>
            </div>
            <div style="margin-top:8px">
              <button class="btn btn-primary" onclick="ModuloForm.guardarModulo()">
                <i class="bi-floppy"></i> Guardar Modulo
              </button>
            </div>
          </div>
        </div>

        <!-- Materiales -->
        <div id="panel-materiales">
          <div class="card">
            <div class="card-header"><h4>Materiales del Modulo</h4></div>
            <div class="card-body">
              <div id="lista-materiales" style="margin-bottom:16px"></div>
              <hr style="margin:16px 0;border-color:var(--color-border)">
              <p class="text-sm fw-semibold" style="margin-bottom:12px">Agregar material</p>
              <div class="form-group">
                <label class="form-label">Tipo</label>
                <select id="mat-tipo" class="form-control">
                  <option value="pdf">Documento PDF</option>
                  <option value="video">Video (YouTube / Vimeo)</option>
                  <option value="enlace">Enlace externo</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Titulo <span class="required">*</span></label>
                <input type="text" id="mat-titulo" class="form-control" placeholder="Ej: Slides Clase 1">
              </div>
              <div class="form-group">
                <label class="form-label">URL <span class="required">*</span></label>
                <input type="url" id="mat-url" class="form-control" placeholder="https://...">
              </div>
              <button class="btn btn-outline" onclick="ModuloForm.agregarMaterial()">
                <i class="bi-plus-lg"></i> Agregar Material
              </button>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="../../js/data/mockdata.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/pages/auth.js"></script>
<script src="../../js/pages/profesor.js"></script>
<script>
  ModuloForm.init();
  document.getElementById("btn-volver-btn").href = document.getElementById("btn-volver").href;
</script>
</body>
</html>
