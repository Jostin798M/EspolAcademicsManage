<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion del Curso — Profesor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <style>
    .tab-bar { display:flex;gap:4px;border-bottom:2px solid var(--color-border);margin-bottom:24px;overflow-x:auto }
    .tab-btn { background:none;border:none;padding:10px 16px;font-size:.875rem;font-weight:500;color:var(--color-text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s,border-color .15s }
    .tab-btn.active,.tab-btn:hover { color:var(--color-primary);border-bottom-color:var(--color-primary) }
    .tab-panel { display:none } .tab-panel.active { display:block }
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:24px }
    .modal-overlay.open { display:flex }
    .modal-box { background:var(--color-surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:fadeIn .2s ease }
    .modal-header { display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--color-border) }
    .modal-header h4 { margin:0 }
    .modal-body { padding:24px }
    .modal-footer { padding:16px 24px;border-top:1px solid var(--color-border);display:flex;justify-content:flex-end;gap:8px;background:#FAFAFA;border-radius:0 0 var(--radius-xl) var(--radius-xl) }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-menu-toggle" id="btn-menu-toggle"><i class="bi-list"></i></button>
        <span class="topbar-title" id="topbar-title">Curso</span>
        <nav class="breadcrumb">
          <a href="mis-cursos.html">Mis Cursos</a>
          <i class="bi-chevron-right text-xs"></i>
          <span class="current" id="curso-nombre">—</span>
        </nav>
      </div>
      <div class="topbar-right" style="gap:8px">
        <span id="curso-estado"></span>
        <span id="curso-codigo"></span>
      </div>
    </header>

    <main class="page-content page-enter">
      <div class="page-header">
        <div>
          <h2 id="curso-nombre-h2">—</h2>
        </div>
        <a id="btn-editar" href="#" class="btn btn-ghost btn-sm">
          <i class="bi-pencil"></i> Editar curso
        </a>
      </div>

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-modulos" onclick="GestionCurso.cambiarTab('modulos')"><i class="bi-collection"></i> Modulos</button>
        <button class="tab-btn" id="tab-tareas"  onclick="GestionCurso.cambiarTab('tareas')"><i class="bi-file-text"></i> Tareas</button>
        <button class="tab-btn" id="tab-quizzes" onclick="GestionCurso.cambiarTab('quizzes')"><i class="bi-patch-question"></i> Quizzes</button>
        <button class="tab-btn" id="tab-estudiantes" onclick="GestionCurso.cambiarTab('estudiantes')"><i class="bi-people"></i> Estudiantes</button>
        <button class="tab-btn" id="tab-formula" onclick="GestionCurso.cambiarTab('formula')"><i class="bi-calculator"></i> Formula</button>
      </div>

      <!-- Panel: Modulos -->
      <div id="panel-modulos" class="tab-panel" style="display:block">
        <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
          <a id="btn-nuevo-modulo" href="#" class="btn btn-primary btn-sm">
            <i class="bi-plus-lg"></i> Nuevo Modulo
          </a>
        </div>
        <div id="lista-modulos"></div>
      </div>

      <!-- Panel: Tareas -->
      <div id="panel-tareas" class="tab-panel">
        <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
          <a id="btn-nueva-tarea" href="#" class="btn btn-primary btn-sm">
            <i class="bi-plus-lg"></i> Nueva Tarea
          </a>
        </div>
        <div id="lista-tareas"></div>
      </div>

      <!-- Panel: Quizzes -->
      <div id="panel-quizzes" class="tab-panel">
        <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
          <a id="btn-nuevo-quiz" href="#" class="btn btn-primary btn-sm">
            <i class="bi-plus-lg"></i> Nuevo Quiz
          </a>
        </div>
        <div id="lista-quizzes"></div>
      </div>

      <!-- Panel: Estudiantes -->
      <div id="panel-estudiantes" class="tab-panel">
        <div style="display:flex;gap:8px;margin-bottom:16px">
          <div class="search-box" style="flex:1">
            <i class="bi-search"></i>
            <input type="text" id="buscar-estudiante" class="form-control" placeholder="Buscar por nombre o identificacion...">
          </div>
          <button class="btn btn-primary btn-sm" onclick="GestionCurso.inscribirEstudiante()">
            <i class="bi-person-plus"></i> Inscribir
          </button>
        </div>
        <div id="lista-estudiantes"></div>
      </div>

      <!-- Panel: Formula -->
      <div id="panel-formula" class="tab-panel">
        <div class="card" style="max-width:420px">
          <div class="card-header">
            <h4>Formula de Calificacion</h4>
            <a id="btn-editar-formula" href="#" class="btn btn-ghost btn-sm">
              <i class="bi-pencil"></i> Editar
            </a>
          </div>
          <div class="card-body" id="formula-display"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modal: Ver entrega -->
<div class="modal-overlay" id="modal-entrega">
  <div class="modal-box">
    <div class="modal-header">
      <h4>Entrega de <span id="entrega-estudiante"></span></h4>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('modal-entrega').classList.remove('open')"><i class="bi-x-lg"></i></button>
    </div>
    <div class="modal-body" id="entrega-contenido"></div>
  </div>
</div>

<!-- Modal: Calificar -->
<div class="modal-overlay" id="modal-calificar">
  <div class="modal-box">
    <div class="modal-header">
      <h4>Calificar a <span id="cal-estudiante"></span></h4>
      <button class="btn btn-ghost btn-sm" onclick="ModalCalificar.cerrar()"><i class="bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nota <span class="required">*</span></label>
        <input type="number" id="cal-nota" class="form-control" min="0" step="0.1" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Retroalimentacion</label>
        <textarea id="cal-comentario" class="form-control" rows="3" placeholder="Comentario para el estudiante..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="ModalCalificar.cerrar()">Cancelar</button>
      <button class="btn btn-primary" onclick="ModalCalificar.guardar()"><i class="bi-check-lg"></i> Guardar</button>
    </div>
  </div>
</div>

<script src="../../js/data/mockdata.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/pages/auth.js"></script>
<script src="../../js/pages/profesor.js"></script>
<script>
  GestionCurso.init();
  const cid = new URLSearchParams(location.search).get("id");
  document.getElementById("btn-editar").href         = `curso-form.html?id=${cid}`;
  document.getElementById("btn-nuevo-modulo").href   = `modulo-form.html?curso_id=${cid}`;
  document.getElementById("btn-nueva-tarea").href    = `tarea-form.html?curso_id=${cid}`;
  document.getElementById("btn-nuevo-quiz").href     = `quiz-form.html?curso_id=${cid}`;
  document.getElementById("btn-editar-formula").href = `curso-form.html?id=${cid}`;
  document.getElementById("curso-nombre-h2").textContent = document.getElementById("curso-nombre").textContent;
  document.getElementById("panel-modulos").classList.add("active");
</script>
</body>
</html>
