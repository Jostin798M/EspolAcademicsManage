<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Usuario — SuperAdmin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-menu-toggle" id="btn-menu-toggle"><i class="bi-list"></i></button>
        <span class="topbar-title" id="topbar-title">Detalle de Usuario</span>
        <nav class="breadcrumb">
          <a href="dashboard.html">Inicio</a>
          <i class="bi-chevron-right text-xs"></i>
          <a href="usuarios.html">Usuarios</a>
          <i class="bi-chevron-right text-xs"></i>
          <span class="current">Detalle</span>
        </nav>
      </div>
      <div class="topbar-right">
        <a href="usuarios.html" class="btn btn-ghost btn-sm"><i class="bi-arrow-left"></i> Volver</a>
      </div>
    </header>

    <main class="page-content page-enter" id="contenido">
      <!-- Perfil -->
      <div class="card" style="margin-bottom:24px">
        <div class="card-body" style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
          <div class="avatar avatar-lg" id="usuario-iniciales" style="width:64px;height:64px;font-size:1.5rem"></div>
          <div style="flex:1">
            <h3 style="margin:0" id="usuario-nombre">—</h3>
            <p style="margin:4px 0 8px;font-size:.875rem" id="usuario-correo">—</p>
            <span id="usuario-estado"></span>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button id="btn-toggle-estado" class="btn btn-outline btn-sm">Cambiar estado</button>
            <a href="usuarios.html" class="btn btn-ghost btn-sm"><i class="bi-pencil"></i> Editar</a>
          </div>
        </div>
      </div>

      <!-- Campos del modulo Clientes -->
      <div class="card">
        <div class="card-header">
          <h4><i class="bi-person-lines-fill text-primary"></i> Informacion completa</h4>
        </div>
        <div class="card-body">
          <div id="campos-usuario"
               style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px">
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../../js/api.js"></script>
<script src="../../js/data/mockdata.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/pages/auth.js"></script>
<script src="../../js/pages/superadmin.js"></script>
<script>DetalleUsuario.init();</script>
</body>
</html>
