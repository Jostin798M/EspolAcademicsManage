<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuracion — SuperAdmin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-menu-toggle" id="btn-menu-toggle"><i class="bi-list"></i></button>
        <span class="topbar-title" id="topbar-title">Configuracion</span>
        <nav class="breadcrumb">
          <a href="dashboard.html">Inicio</a>
          <i class="bi-chevron-right text-xs"></i>
          <span class="current">Configuracion</span>
        </nav>
      </div>
    </header>

    <main class="page-content page-enter">
      <div class="page-header">
        <h2>Configuracion Global</h2>
      </div>

      <div class="card" style="max-width:520px">
        <div class="card-header">
          <h4><i class="bi-gear text-primary"></i> Parametros del sistema</h4>
        </div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:20px">

          <div class="form-group">
            <label class="form-label">
              Porcentaje minimo de aprobacion <span class="required">*</span>
            </label>
            <div style="display:flex;align-items:center;gap:8px">
              <input type="number" id="porcentaje-aprobacion" class="form-control"
                     min="1" max="100" style="max-width:120px">
              <span class="text-muted text-sm">/ 100</span>
            </div>
            <span class="form-text">
              Un estudiante aprueba un curso si su nota final es mayor o igual a este valor.
              Actualmente en ESPOL es <strong>60</strong>.
            </span>
          </div>

          <div class="alert alert-warning">
            <i class="bi-exclamation-triangle"></i>
            <span>Este cambio afecta el calculo de aprobacion en todos los cursos de la plataforma.</span>
          </div>

        </div>
        <div class="card-footer" style="display:flex;justify-content:flex-end">
          <button class="btn btn-primary" onclick="Configuracion.guardar()">
            <i class="bi-check-lg"></i> Guardar cambios
          </button>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../../js/data/mockdata.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/pages/auth.js"></script>
<script src="../../js/pages/superadmin.js"></script>
<script>Configuracion.init();</script>
</body>
</html>
