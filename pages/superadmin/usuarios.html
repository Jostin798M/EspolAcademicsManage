<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios — SuperAdmin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <style>
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 200;
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--color-surface); border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg); width: 100%; max-width: 640px;
      max-height: 90vh; overflow-y: auto;
      animation: fadeIn .2s ease;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--color-border);
    }
    .modal-header h4 { margin: 0; }
    .modal-body   { padding: 24px; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid var(--color-border);
      display: flex; justify-content: flex-end; gap: 8px;
      background: #FAFAFA; border-radius: 0 0 var(--radius-xl) var(--radius-xl);
    }
  </style>
</head>
<body>
<div class="app-layout">

  <div id="sidebar-container"></div>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-menu-toggle" id="btn-menu-toggle"><i class="bi-list"></i></button>
        <span class="topbar-title" id="topbar-title">Usuarios</span>
        <nav class="breadcrumb">
          <a href="dashboard.html">Inicio</a>
          <i class="bi-chevron-right text-xs"></i>
          <span class="current">Usuarios</span>
        </nav>
      </div>
    </header>

    <main class="page-content page-enter">
      <div class="page-header">
        <div>
          <h2>Gestion de Usuarios</h2>
          <p style="margin:4px 0 0" class="text-sm">Modulo Clientes — administracion de todos los usuarios del sistema.</p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-primary" onclick="ModalUsuario.abrir()">
            <i class="bi-plus-lg"></i> Registrar usuario
          </button>
        </div>
      </div>

      <!-- Buscador -->
      <div style="margin-bottom:16px">
        <div class="search-box">
          <i class="bi-search"></i>
          <input type="text" id="buscador" class="form-control"
                 placeholder="Buscar por nombre, apellido o identificacion...">
        </div>
      </div>

      <!-- Tabla -->
      <div class="table-container">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Usuario</th>
              <th>Identificacion</th>
              <th>Telefono</th>
              <th>Celular</th>
              <th>Estado Civil</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-usuarios"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<!-- Modal registro/edicion de usuario -->
<div class="modal-overlay" id="modal-usuario">
  <div class="modal-box">
    <div class="modal-header">
      <h4 id="modal-titulo">Registrar Usuario</h4>
      <button class="btn btn-ghost btn-sm" onclick="ModalUsuario.cerrar()"><i class="bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <form id="form-usuario" onsubmit="return false">
        <div class="form-grid form-grid-2" style="gap:16px">

          <div class="form-group">
            <label class="form-label">Nombres <span class="required">*</span></label>
            <input type="text" id="f-nombres" class="form-control" placeholder="Ej: Maria Elena">
            <span class="form-error" id="err-nombres"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Apellidos <span class="required">*</span></label>
            <input type="text" id="f-apellidos" class="form-control" placeholder="Ej: Torres Vega">
            <span class="form-error" id="err-apellidos"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Identificacion <span class="required">*</span></label>
            <input type="text" id="f-identificacion" class="form-control" placeholder="Cedula o pasaporte">
            <span class="form-error" id="err-identificacion"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Correo <span class="required">*</span></label>
            <input type="email" id="f-correo" class="form-control" placeholder="usuario@espol.edu.ec">
            <span class="form-error" id="err-correo"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Celular <span class="required">*</span></label>
            <input type="tel" id="f-celular" class="form-control" placeholder="09XXXXXXXX">
            <span class="form-error" id="err-celular"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Telefono</label>
            <input type="tel" id="f-telefono" class="form-control" placeholder="04XXXXXXX">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Direccion</label>
            <input type="text" id="f-direccion" class="form-control" placeholder="Direccion (opcional)">
          </div>
          <div class="form-group">
            <label class="form-label">Estado Civil <span class="required">*</span></label>
            <select id="f-estado-civil" class="form-control">
              <option value="">Seleccionar...</option>
              <option value="soltero">Soltero/a</option>
              <option value="casado">Casado/a</option>
              <option value="divorciado">Divorciado/a</option>
              <option value="separado">Separado/a</option>
              <option value="union libre">Union libre</option>
            </select>
            <span class="form-error" id="err-estado-civil"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Estado <span class="required">*</span></label>
            <select id="f-estado" class="form-control">
              <option value="activo">Activo</option>
              <option value="inactivo">Inactivo</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Rol del sistema</label>
            <select id="f-rol" class="form-control">
              <option value="USER">Usuario (Profesor/Estudiante)</option>
              <option value="ADMIN">Admin de Facultad</option>
              <option value="SUPERADMIN">Super Admin</option>
            </select>
          </div>

        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="ModalUsuario.cerrar()">Cancelar</button>
      <button class="btn btn-primary" onclick="ModalUsuario.guardar()">
        <i class="bi-check-lg"></i> Guardar
      </button>
    </div>
  </div>
</div>

<script src="../../js/api.js"></script>
<script src="../../js/data/mockdata.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/pages/auth.js"></script>
<script src="../../js/pages/superadmin.js"></script>
<script>Usuarios.init();</script>
</body>
</html>
