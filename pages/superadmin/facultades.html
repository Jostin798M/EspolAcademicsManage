<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facultades — SuperAdmin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <style>
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:24px; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--color-surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:480px;animation:fadeIn .2s ease; }
    .modal-header { display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--color-border); }
    .modal-header h4 { margin:0; }
    .modal-body { padding:24px; }
    .modal-footer { padding:16px 24px;border-top:1px solid var(--color-border);display:flex;justify-content:flex-end;gap:8px;background:#FAFAFA;border-radius:0 0 var(--radius-xl) var(--radius-xl); }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-menu-toggle" id="btn-menu-toggle"><i class="bi-list"></i></button>
        <span class="topbar-title" id="topbar-title">Facultades</span>
        <nav class="breadcrumb">
          <a href="dashboard.html">Inicio</a>
          <i class="bi-chevron-right text-xs"></i>
          <span class="current">Facultades</span>
        </nav>
      </div>
    </header>

    <main class="page-content page-enter">
      <div class="page-header">
        <h2>Gestion de Facultades</h2>
        <div class="page-header-actions">
          <button class="btn btn-primary" onclick="ModalFacultad.abrir()">
            <i class="bi-plus-lg"></i> Nueva facultad
          </button>
        </div>
      </div>

      <div class="table-container">
        <table class="table">
          <thead>
            <tr>
              <th>Codigo</th>
              <th>Nombre</th>
              <th>Admin asignado</th>
              <th>Cursos</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-facultades"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-facultad">
  <div class="modal-box">
    <div class="modal-header">
      <h4>Facultad</h4>
      <button class="btn btn-ghost btn-sm" onclick="ModalFacultad.cerrar()"><i class="bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <form id="form-facultad" onsubmit="return false">
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="form-group">
            <label class="form-label">Nombre <span class="required">*</span></label>
            <input type="text" id="ff-nombre" class="form-control" placeholder="Nombre completo de la facultad">
          </div>
          <div class="form-group">
            <label class="form-label">Codigo <span class="required">*</span></label>
            <input type="text" id="ff-codigo" class="form-control" placeholder="Ej: FIEC" maxlength="10">
          </div>
          <div class="form-group">
            <label class="form-label">Admin asignado</label>
            <select id="ff-admin" class="form-control"><option value="">Sin asignar</option></select>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="ModalFacultad.cerrar()">Cancelar</button>
      <button class="btn btn-primary" onclick="ModalFacultad.guardar()"><i class="bi-check-lg"></i> Guardar</button>
    </div>
  </div>
</div>

<script src="../../js/api.js"></script>
<script src="../../js/data/mockdata.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/pages/auth.js"></script>
<script src="../../js/pages/superadmin.js"></script>
<script>Facultades.init();</script>
</body>
</html>
