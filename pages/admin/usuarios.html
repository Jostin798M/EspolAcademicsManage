<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios — Admin Facultad</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <style>
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:24px; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--color-surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;animation:fadeIn .2s ease; }
    .modal-header { display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--color-border); }
    .modal-header h4 { margin:0; }
    .modal-body { padding:24px; }
    .modal-footer { padding:16px 24px;border-top:1px solid var(--color-border);display:flex;justify-content:flex-end;gap:8px;background:#FAFAFA;border-radius:0 0 var(--radius-xl) var(--radius-xl); }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-menu-toggle" id="btn-menu-toggle"><i class="bi-list"></i></button>
        <span class="topbar-title" id="topbar-title">Usuarios</span>
        <nav class="breadcrumb">
          <a href="dashboard.html">Inicio</a>
          <i class="bi-chevron-right text-xs"></i>
          <span class="current">Usuarios</span>
        </nav>
      </div>
    </header>

    <main class="page-content page-enter">
      <div class="page-header">
        <div>
          <h2>Usuarios de mi Facultad</h2>
          <p class="text-sm" style="margin:4px 0 0">Estudiantes y profesores activos en cursos de tu facultad.</p>
        </div>
      </div>

      <div style="margin-bottom:16px">
        <div class="search-box">
          <i class="bi-search"></i>
          <input type="text" id="buscador" class="form-control"
                 placeholder="Buscar por nombre, apellido o identificacion...">
        </div>
      </div>

      <div class="table-container">
        <table class="table">
          <thead>
            <tr>
              <th>Usuario</th>
              <th>Identificacion</th>
              <th>Celular</th>
              <th>Estado Civil</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-usuarios"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<!-- Modal edicion (Admin no puede cambiar rol, solo datos personales) -->
<div class="modal-overlay" id="modal-admin-usuario">
  <div class="modal-box">
    <div class="modal-header">
      <h4>Editar Usuario</h4>
      <button class="btn btn-ghost btn-sm" onclick="AdminModalUsuario.cerrar()"><i class="bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div class="alert alert-info" style="margin-bottom:16px">
        <i class="bi-info-circle"></i>
        <span>El Admin de Facultad puede editar datos personales. El rol del sistema solo puede modificarlo el SuperAdmin.</span>
      </div>
      <form onsubmit="return false">
        <div class="form-grid form-grid-2" style="gap:16px">
          <div class="form-group">
            <label class="form-label">Nombres <span class="required">*</span></label>
            <input type="text" id="af-nombres" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Apellidos <span class="required">*</span></label>
            <input type="text" id="af-apellidos" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Identificacion <span class="required">*</span></label>
            <input type="text" id="af-identificacion" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Correo</label>
            <input type="email" id="af-correo" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Celular <span class="required">*</span></label>
            <input type="tel" id="af-celular" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Telefono</label>
            <input type="tel" id="af-telefono" class="form-control">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Direccion</label>
            <input type="text" id="af-direccion" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Estado Civil <span class="required">*</span></label>
            <select id="af-estado-civil" class="form-control">
              <option value="soltero">Soltero/a</option>
              <option value="casado">Casado/a</option>
              <option value="divorciado">Divorciado/a</option>
              <option value="separado">Separado/a</option>
              <option value="union libre">Union libre</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Estado</label>
            <select id="af-estado" class="form-control">
              <option value="activo">Activo</option>
              <option value="inactivo">Inactivo</option>
            </select>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="AdminModalUsuario.cerrar()">Cancelar</button>
      <button class="btn btn-primary" onclick="AdminModalUsuario.guardar()">
        <i class="bi-check-lg"></i> Guardar
      </button>
    </div>
  </div>
</div>

<script src="../../js/data/mockdata.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/pages/auth.js"></script>
<script src="../../js/pages/admin.js"></script>
<script>AdminUsuarios.init();</script>
</body>
</html>
