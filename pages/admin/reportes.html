<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — Admin Facultad</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-menu-toggle" id="btn-menu-toggle"><i class="bi-list"></i></button>
        <span class="topbar-title" id="topbar-title">Reportes</span>
        <nav class="breadcrumb">
          <a href="dashboard.html">Inicio</a>
          <i class="bi-chevron-right text-xs"></i>
          <span class="current">Reportes</span>
        </nav>
      </div>
      <div class="topbar-right">
        <span class="text-sm text-muted" id="nombre-facultad"></span>
      </div>
    </header>

    <main class="page-content page-enter">
      <div class="page-header">
        <h2>Reportes de Facultad</h2>
      </div>

      <div class="kpi-grid" style="margin-bottom:24px">
        <div class="kpi-card">
          <div class="kpi-icon success"><i class="bi-book"></i></div>
          <div class="kpi-info">
            <div class="kpi-value" id="r-cursos">—</div>
            <div class="kpi-label">Total cursos</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon primary"><i class="bi-people"></i></div>
          <div class="kpi-info">
            <div class="kpi-value" id="r-estudiantes">—</div>
            <div class="kpi-label">Estudiantes activos</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h4><i class="bi-bar-chart text-primary"></i> Aprobacion por Curso</h4>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-container" style="border:none;border-radius:0;box-shadow:none">
            <table class="table">
              <thead>
                <tr>
                  <th>Curso</th>
                  <th>Profesor</th>
                  <th>Estudiantes</th>
                  <th>Tasa de aprobacion</th>
                </tr>
              </thead>
              <tbody id="tabla-reportes"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="alert alert-info" style="margin-top:16px">
        <i class="bi-info-circle"></i>
        <span>Datos simulados para fase de frontend. Se conectaran con el backend en la siguiente fase.</span>
      </div>
    </main>
  </div>
</div>

<script src="../../js/api.js"></script>
<script src="../../js/data/mockdata.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/pages/auth.js"></script>
<script src="../../js/pages/admin.js"></script>
<script>AdminReportes.init();</script>
</body>
</html>
