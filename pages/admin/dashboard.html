<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Admin Facultad</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-menu-toggle" id="btn-menu-toggle"><i class="bi-list"></i></button>
        <span class="topbar-title" id="topbar-title">Dashboard</span>
        <nav class="breadcrumb"><span class="current">Inicio</span></nav>
      </div>
      <div class="topbar-right">
        <span class="text-sm text-muted" id="nombre-facultad"></span>
      </div>
    </header>

    <main class="page-content page-enter">

      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-icon success"><i class="bi-book"></i></div>
          <div class="kpi-info">
            <div class="kpi-value" id="kpi-cursos">—</div>
            <div class="kpi-label">Cursos activos</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon primary"><i class="bi-people"></i></div>
          <div class="kpi-info">
            <div class="kpi-value" id="kpi-estudiantes">—</div>
            <div class="kpi-label">Estudiantes</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon secondary"><i class="bi-person-workspace"></i></div>
          <div class="kpi-info">
            <div class="kpi-value" id="kpi-profesores">—</div>
            <div class="kpi-label">Profesores</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon warning"><i class="bi-graph-up"></i></div>
          <div class="kpi-info">
            <div class="kpi-value" id="kpi-tasa">—</div>
            <div class="kpi-label">Tasa de aprobacion</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h4><i class="bi-book text-primary"></i> Cursos de mi Facultad</h4>
          <a href="cursos.html" class="btn btn-ghost btn-sm">Ver todos <i class="bi-arrow-right"></i></a>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-container" style="border:none;border-radius:0;box-shadow:none">
            <table class="table">
              <thead>
                <tr>
                  <th>Curso</th>
                  <th>Profesor</th>
                  <th>Estado</th>
                  <th>Fecha fin</th>
                </tr>
              </thead>
              <tbody id="tabla-cursos-recientes"></tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="../../js/api.js"></script>
<script src="../../js/data/mockdata.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/pages/auth.js"></script>
<script src="../../js/pages/admin.js"></script>
<script>AdminDashboard.init();</script>
</body>
</html>
