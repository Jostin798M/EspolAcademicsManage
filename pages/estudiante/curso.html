<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso — Estudiante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-menu-toggle" id="btn-menu-toggle"><i class="bi-list"></i></button>
        <span class="topbar-title" id="topbar-title">Curso</span>
        <nav class="breadcrumb">
          <a href="mis-cursos.html">Mis Cursos</a>
          <i class="bi-chevron-right text-xs"></i>
          <span class="current" id="curso-nombre">—</span>
        </nav>
      </div>
      <div class="topbar-right">
        <span id="curso-codigo"></span>
      </div>
    </header>

    <main class="page-content page-enter">

      <!-- Aviso archivado -->
      <div id="aviso-archivado" class="alert alert-warning" style="display:none;margin-bottom:16px">
        <i class="bi-archive"></i>
        <span>Este curso ha finalizado. Puedes revisar el contenido y tus calificaciones, pero no puedes entregar tareas o quizzes.</span>
      </div>

      <!-- Header del curso -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px">
            <div>
              <h3 id="curso-nombre-h2" style="margin:0 0 6px"></h3>
              <p class="text-sm text-muted" id="curso-descripcion" style="margin:0 0 10px;max-width:560px"></p>
              <div style="display:flex;gap:16px;flex-wrap:wrap">
                <span class="text-xs text-muted"><i class="bi-building"></i> <span id="curso-facultad"></span></span>
                <span class="text-xs text-muted"><i class="bi-person-workspace"></i> <span id="curso-profesor"></span></span>
                <span class="text-xs text-muted"><i class="bi-calendar-range"></i> <span id="curso-fechas"></span></span>
              </div>
            </div>
            <div style="text-align:center;min-width:100px">
              <div style="font-size:1.75rem;font-weight:700;color:var(--color-primary)" id="progreso-pct">—</div>
              <div class="progress-bar" style="width:80px;margin:6px auto"><div class="progress-fill" id="progreso-bar" style="width:0%"></div></div>
              <div class="text-xs text-muted">progreso</div>
            </div>
          </div>
        </div>
      </div>

      <div class="content-grid-3" style="gap:24px">
        <!-- Modulos -->
        <div style="grid-column:1/3">
          <div class="card">
            <div class="card-header">
              <h4><i class="bi-collection text-primary"></i> Modulos</h4>
            </div>
            <div class="card-body" style="padding:0 16px">
              <div id="lista-modulos" style="padding:8px 0"></div>
            </div>
          </div>
        </div>

        <!-- Sidebar de actividades -->
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="card">
            <div class="card-header">
              <h4><i class="bi-file-text text-warning"></i> Tareas pendientes</h4>
            </div>
            <div class="card-body" id="lista-tareas" style="padding:0 16px"></div>
            <div style="padding:12px 16px;border-top:1px solid var(--color-border)">
              <a id="link-calificaciones" href="#" class="btn btn-ghost btn-sm" style="width:100%">
                Ver calificaciones <i class="bi-arrow-right"></i>
              </a>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <h4><i class="bi-patch-question text-secondary"></i> Quizzes pendientes</h4>
            </div>
            <div class="card-body" id="lista-quizzes" style="padding:0 16px"></div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="../../js/data/mockdata.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/pages/auth.js"></script>
<script src="../../js/pages/estudiante.js"></script>
<script>
  CursoEstudiante.init();
  const cid = new URLSearchParams(location.search).get("id");
  document.getElementById("link-calificaciones").href = `calificaciones.html`;
  document.getElementById("curso-nombre-h2").textContent = document.getElementById("curso-nombre").textContent;
</script>
</body>
</html>
