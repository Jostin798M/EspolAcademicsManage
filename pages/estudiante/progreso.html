<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Progreso — Estudiante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-menu-toggle" id="btn-menu-toggle"><i class="bi-list"></i></button>
        <span class="topbar-title" id="topbar-title">Mi Progreso</span>
        <nav class="breadcrumb"><span class="current">Progreso</span></nav>
      </div>
    </header>

    <main class="page-content page-enter">
      <div class="page-header">
        <h2>Mi Progreso</h2>
      </div>

      <!-- KPIs globales -->
      <div class="kpi-grid" style="margin-bottom:24px">
        <div class="kpi-card">
          <div class="kpi-icon primary"><i class="bi-book"></i></div>
          <div class="kpi-info">
            <div class="kpi-value" id="kpi-cursos-activos">—</div>
            <div class="kpi-label">Cursos activos</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon success"><i class="bi-collection"></i></div>
          <div class="kpi-info">
            <div class="kpi-value" id="kpi-modulos">—</div>
            <div class="kpi-label">Modulos completados</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon warning"><i class="bi-graph-up"></i></div>
          <div class="kpi-info">
            <div class="kpi-value" id="kpi-global">—</div>
            <div class="kpi-label">Progreso global</div>
          </div>
        </div>
      </div>

      <div id="lista-progreso"></div>
    </main>
  </div>
</div>

<script src="../../js/data/mockdata.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/pages/auth.js"></script>
<script src="../../js/pages/estudiante.js"></script>
<script>ProgresoEstudiante.init();</script>
</body>
</html>
